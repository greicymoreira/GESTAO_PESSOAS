</body>
<script>

// ================= CONFIG =================
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRE3Q_RdpZOqc4f3O3fQirMQkEXQWyBkiIIXB6LZWgqTZbItGBHAxUlf2-OkEcALDlUfyPeK7GyBQrB/pub?gid=1371643814&single=true&output=csv";

// ================= VARS =================
let ROWS = [];
let COL = {};

// ================= UTILS =================
const $ = id => document.getElementById(id);
const clean = v => (v ?? "").toString().trim();

const norm = v => clean(v)
  .normalize("NFD")
  .replace(/[\u0300-\u036f]/g, "")
  .toUpperCase();

const fmtInt = n => (+n || 0).toLocaleString("pt-BR");
const fmtPct = n => (+n || 0).toLocaleString("pt-BR",{minimumFractionDigits:1}) + "%";

// ================= CSV =================
function splitCSVLine(line){
  const result = [];
  let current = "";
  let insideQuotes = false;

  for(let i=0;i<line.length;i++){
    const char = line[i];
    const next = line[i+1];

    if(char === '"' && insideQuotes && next === '"'){
      current += '"';
      i++;
    } else if(char === '"'){
      insideQuotes = !insideQuotes;
    } else if(char === "," && !insideQuotes){
      result.push(current);
      current = "";
    } else {
      current += char;
    }
  }

  result.push(current);
  return result;
}

function parseCSV(text){
  const lines = text.replace(/\r/g,"").split("\n").filter(l=>l.trim());
  const headers = splitCSVLine(lines[0]).map(h=>h.trim());

  return lines.slice(1).map(line=>{
    const values = splitCSVLine(line);
    const obj = {};
    headers.forEach((h,i)=>obj[h]=values[i]||"");
    return obj;
  });
}

// ================= CORE =================
function pick(headers, names){
  const normalized = headers.map(norm);

  for(const n of names){
    const i = normalized.findIndex(h=>h===norm(n));
    if(i>=0) return headers[i];
  }

  for(const n of names){
    const nn = norm(n);
    const i = normalized.findIndex(h=>h.includes(nn));
    if(i>=0) return headers[i];
  }

  return null;
}

function val(row,col){
  return col ? clean(row[col]) : "";
}

// ================= REGRAS =================
function isAfastado(row){
  const v = norm(val(row,COL.afast));
  return v && !v.includes("ATIVO");
}

function isOperacional(row){
  const x = norm([
    val(row,COL.tipo),
    val(row,COL.funcaoCargo),
    val(row,COL.descricao)
  ].join(" "));

  return x.includes("GARI") || x.includes("OPER") || x.includes("COLETA");
}

// ================= RENDER =================
function render(){

  const total = ROWS.length;
  const afastados = ROWS.filter(isAfastado).length;
  const ativos = total - afastados;

  const operacionais = ROWS.filter(isOperacional).length;

  const idades = ROWS.map(r=>+val(r,COL.idade)).filter(n=>n>0);
  const acima55 = idades.filter(n=>n>=55).length;

  // KPIs
  $("kTotal").textContent = fmtInt(total);
  $("kAtivos").textContent = fmtInt(ativos);
  $("kAfast").textContent = fmtInt(afastados);
  $("kRisco").textContent = idades.length ? fmtPct(acima55/idades.length*100) : "N/D";

  $("opQtd").textContent = fmtInt(operacionais);
  $("admQtd").textContent = fmtInt(total-operacionais);

  const pctOper = total ? operacionais/total*100 : 0;
  $("donutPct").textContent = fmtPct(pctOper);
  $("donut").style.setProperty("--opPct", pctOper+"%");

}

// ================= LOAD =================
async function loadData(){

  try{

    const res = await fetch(CSV_URL + "&t=" + Date.now(), {cache:"no-store"});
    if(!res.ok) throw new Error("Erro HTTP");

    const text = await res.text();
    const rows = parseCSV(text);

    ROWS = rows;

    const headers = Object.keys(rows[0]);

    COL = {
      dir: pick(headers,["DIRETORIA"]),
      sup: pick(headers,["SUPERINTENDÊNCIA"]),
      setor: pick(headers,["SETOR"]),
      ref: pick(headers,["REFERENCIA"]),
      afast: pick(headers,["AFASTAMENTO"]),
      tipo: pick(headers,["TIPOCARGO"]),
      funcaoCargo: pick(headers,["FUNCAOCARGO"]),
      descricao: pick(headers,["DESCRIÇÃO"]),
      idade: pick(headers,["IDADEANOS"])
    };

    render();

  }catch(err){
    console.error(err);
    $("status").style.display="block";
    $("status").textContent="Erro ao carregar dados (CSV).";
  }
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", loadData);

</script>
