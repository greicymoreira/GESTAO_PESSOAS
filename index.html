<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzi36bCLqS3doiy4tXvaryAzYM_E6OzGM0a0X9PDDSsYaSDehQ0-KMliFXGOk0rgBCE/exec";

let ROWS = [];
let COL = {};

const $ = id => document.getElementById(id);
const clean = v => (v ?? "").toString().trim();
const norm = v => clean(v).normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
const fmtInt = n => (+n || 0).toLocaleString("pt-BR");
const fmtPct = n => (+n || 0).toLocaleString("pt-BR", {minimumFractionDigits:1, maximumFractionDigits:1}) + "%";

function showError(msg){
  const el = $("status");
  if(el){
    el.style.display = "block";
    el.textContent = msg;
  }
}

function hideError(){
  const el = $("status");
  if(el) el.style.display = "none";
}

function setLoading(isLoading){
  const txt = isLoading ? "Carregando..." : "Todas";
  ["fDir","fSupCoord","fSetor"].forEach(id => {
    const el = $(id);
    if(el && isLoading){
      el.innerHTML = `<option>${txt}</option>`;
    }
  });
}

function pick(headers, candidates){
  const normalized = headers.map(norm);

  for(const c of candidates){
    const i = normalized.findIndex(h => h === norm(c));
    if(i >= 0) return headers[i];
  }

  for(const c of candidates){
    const nc = norm(c);
    const i = normalized.findIndex(h => h.includes(nc) || nc.includes(h));
    if(i >= 0) return headers[i];
  }

  return null;
}

function val(row, col){
  return col ? clean(row[col]) : "";
}

function numberFrom(v){
  let s = clean(v).replace(/[^0-9,.-]/g, "");
  if(s.includes(",") && s.includes(".")){
    s = s.replace(/\./g, "").replace(",", ".");
  } else {
    s = s.replace(",", ".");
  }
  return parseFloat(s) || 0;
}

function isAfastado(v){
  const x = norm(v);
  return (
    x.includes("AFAST") ||
    x.includes("LICEN") ||
    x.includes("INATIVO") ||
    x.includes("CEDID") ||
    x.includes("SUSP") ||
    x.includes("FERIAS")
  );
}

function isOperacional(row){
  const x = norm([
    val(row,COL.tipo),
    val(row,COL.tipoSetor),
    val(row,COL.cargo),
    val(row,COL.funcao)
  ].join(" "));

  return (
    x.includes("OPER") ||
    x.includes("GARI") ||
    x.includes("MOTOR") ||
    x.includes("FISCAL") ||
    x.includes("AGENTE") ||
    x.includes("RODOVIARI")
  );
}

function supCoordVal(row){
  const sup = val(row,COL.sup);
  const coord = val(row,COL.coord);
  const combo = val(row,COL.supCoord);

  if(combo) return combo;
  if(sup && coord && norm(sup) !== norm(coord)) return sup + " / " + coord;
  return sup || coord || "";
}

function groupBy(arr, fn){
  return arr.reduce((acc,row) => {
    const key = fn(row) || "Não informado";
    (acc[key] ||= []).push(row);
    return acc;
  }, {});
}

function fillSelect(id, values, allLabel){
  const el = $(id);
  if(!el) return;

  const current = el.value;
  const list = [...new Set(values.filter(Boolean))]
    .sort((a,b)=>a.localeCompare(b,"pt-BR"));

  el.innerHTML =
    `<option value="">${allLabel}</option>` +
    list.map(v => `<option value="${String(v).replaceAll('"','&quot;')}">${v}</option>`).join("");

  if([...el.options].some(o => o.value === current)){
    el.value = current;
  }
}

function filteredRows(){
  return ROWS.filter(row =>
    (!$("fDir")?.value || val(row,COL.dir) === $("fDir").value) &&
    (!$("fSupCoord")?.value || supCoordVal(row) === $("fSupCoord").value) &&
    (!$("fSetor")?.value || val(row,COL.setor) === $("fSetor").value) &&
    (!$("fRef")?.value || val(row,COL.ref) === $("fRef").value)
  );
}

function populateFilters(){
  fillSelect("fDir", ROWS.map(r => val(r,COL.dir)), "Todas as Diretorias");
  fillSelect("fSupCoord", ROWS.map(r => supCoordVal(r)), "Todas");
  fillSelect("fSetor", ROWS.map(r => val(r,COL.setor)), "Todos os Setores");
  fillSelect("fRef", ROWS.map(r => val(r,COL.ref)), "Todas");
}

function render(){
  const data = filteredRows();
  const total = data.length;

  const afastados = data.filter(r => isAfastado(val(r,COL.afast))).length;
  const ativos = total - afastados;

  const idades = data
    .map(r => numberFrom(val(r,COL.idade)))
    .filter(n => n > 0);

  const acima55 = idades.filter(n => n >= 55).length;
  const operacionais = data.filter(isOperacional).length;
  const administrativos = total - operacionais;

  const pctAtivos = total ? ativos / total * 100 : 0;
  const pctAfast = total ? afastados / total * 100 : 0;
  const pctRisco = idades.length ? acima55 / idades.length * 100 : 0;
  const pctOperacional = total ? operacionais / total * 100 : 0;

  if($("kTotal")) $("kTotal").textContent = fmtInt(total);
  if($("kAtivos")) $("kAtivos").textContent = fmtInt(ativos);
  if($("kAfast")) $("kAfast").textContent = fmtInt(afastados);
  if($("kRisco")) $("kRisco").textContent = idades.length ? fmtPct(pctRisco) : "N/D";

  if($("nAtivos")) $("nAtivos").textContent = fmtPct(pctAtivos) + " disponíveis";
  if($("nAfast")) $("nAfast").textContent = fmtPct(pctAfast) + " do total";
  if($("nRisco")) $("nRisco").textContent = idades.length ? fmtInt(acima55) + " servidores acima de 55 anos" : "coluna de idade não localizada";

  if($("opQtd")) $("opQtd").textContent = fmtInt(operacionais);
  if($("admQtd")) $("admQtd").textContent = fmtInt(administrativos);
  if($("donutPct")) $("donutPct").textContent = fmtPct(pctOperacional);
  if($("donut")) $("donut").style.setProperty("--opPct", pctOperacional + "%");

  if($("compHint")){
    $("compHint").textContent =
      pctOperacional >= 60
      ? "Predominância operacional coerente com a atividade-fim."
      : "Estrutura com maior peso relativo administrativo.";
  }

  renderDirBars(data,total);
  renderActivityCols(data);
  renderAlerts(total,pctAfast,pctRisco,pctOperacional);
  renderRanking(data);
}

function renderDirBars(data,total){
  const el = $("dirBars");
  if(!el) return;

  const rows = Object.entries(groupBy(data, r => val(r,COL.dir)))
    .map(([k,v])=>[k,v.length])
    .sort((a,b)=>b[1]-a[1])
    .slice(0,6);

  const max = rows[0]?.[1] || 1;

  el.innerHTML = rows.map(([k,v]) => `
    <div class="barRow">
      <span title="${k}">${k}</span>
      <div class="track"><div class="fill" style="width:${v/max*100}%"></div></div>
      <b class="num">${fmtInt(v)}</b>
      <span class="pct">${fmtPct(total ? v/total*100 : 0)}</span>
    </div>
  `).join("") || `<div class="hint">Sem dados.</div>`;
}

function renderActivityCols(data){
  const el = $("activityCols");
  if(!el) return;

  const rows = Object.entries(groupBy(data, r => val(r,COL.dir)))
    .map(([k,v]) => {
      const afast = v.filter(r => isAfastado(val(r,COL.afast))).length;
      return [k,v.length, v.length ? (v.length-afast)/v.length*100 : 0];
    })
    .sort((a,b)=>b[1]-a[1])
    .slice(0,6);

  el.innerHTML = rows.map(([k,_,p]) => `
    <div class="colWrap">
      <div class="colVal ${p < 80 ? "warn" : ""}">${fmtPct(p)}</div>
      <div class="col" style="--h:${Math.max(18,p)}%"></div>
      <div class="colLbl" title="${k}">${k}</div>
    </div>
  `).join("") || `<div class="hint">Sem dados.</div>`;
}

function renderAlerts(total,pctAfast,pctRisco,pctOperacional){
  const el = $("alerts");
  if(!el) return;

  el.innerHTML = `
    <div class="alert orange">
      <small>Pressão operacional</small>
      <b>${fmtPct(pctAfast)}</b>
      <span>afastamento geral no filtro atual</span>
    </div>
    <div class="alert red">
      <small>Renovação</small>
      <b>${pctRisco ? fmtPct(pctRisco) : "N/D"}</b>
      <span>do quadro acima de 55 anos</span>
    </div>
    <div class="alert green">
      <small>Estrutura</small>
      <b>${fmtPct(pctOperacional)}</b>
      <span>concentração operacional</span>
    </div>
    <div class="alert">
      <small>Base filtrada</small>
      <b>${fmtInt(total)}</b>
      <span>servidores no recorte selecionado</span>
    </div>
  `;
}

function renderRanking(data){
  const el = $("ranking");
  if(!el) return;

  const rows = Object.entries(groupBy(data, r => val(r,COL.dir)))
    .map(([k,v]) => {
      const afast = v.filter(r => isAfastado(val(r,COL.afast))).length;
      const ativos = v.length - afast;
      const pct = v.length ? ativos / v.length * 100 : 0;
      return [k,v.length,ativos,afast,pct];
    })
    .filter(x=>x[1]>=5)
    .sort((a,b)=>a[4]-b[4])
    .slice(0,5);

  el.innerHTML = rows.map(([k,total,ativos,afast,pct]) => `
    <div class="rank">
      <div>
        <b>${k}</b>
        <small>${fmtInt(ativos)} ativos · ${fmtInt(afast)} afastados · ${fmtPct(pct)} atividade</small>
      </div>
      <span class="statusPill ${pct < 75 ? "crit" : pct < 85 ? "att" : "ok"}">
        ${pct < 75 ? "Crítico" : pct < 85 ? "Atenção" : "Monitorar"}
      </span>
    </div>
  `).join("") || `<div class="hint">Sem ranking disponível.</div>`;
}

async function fetchWithFallback(url){
  const directUrl = url + (url.includes("?") ? "&" : "?") + "t=" + Date.now();

  try{
    const res = await fetch(directUrl, { cache:"no-store", mode:"cors" });
    if(!res.ok) throw new Error("HTTP " + res.status);
    return await res.json();
  }catch(e){
    throw new Error("Falha ao acessar o Apps Script. Verifique se o deploy está como Web App, execução como você e acesso como Qualquer pessoa.");
  }
}

async function loadData(){
  try{
    hideError();
    setLoading(true);

    if($("updated")){
      $("updated").textContent = "Atualizado em: carregando...";
    }

    if(!API_URL || !API_URL.includes("/exec")){
      throw new Error("URL do Apps Script inválida. Ela precisa terminar com /exec.");
    }

    const json = await fetchWithFallback(API_URL);

    const rows =
      Array.isArray(json) ? json :
      Array.isArray(json.rows) ? json.rows :
      Array.isArray(json.data) ? json.data :
      [];

    if(!rows.length){
      throw new Error("A API respondeu, mas não retornou dados. Esperado: rows[] ou data[].");
    }

    ROWS = rows.filter(row => Object.values(row).some(v => clean(v)));

    if(!ROWS.length){
      throw new Error("Base retornada vazia.");
    }

    const headers = Object.keys(ROWS[0]);

    COL = {
      dir: pick(headers,["DIRETORIA","DIR","DIRETORIA_ATUAL"]),
      supCoord: pick(headers,["SUPERINTENDÊNCIA / COORDENAÇÃO","SUPERINTENDENCIA / COORDENACAO","SUPERINTENDENCIA_COORDENACAO","SUPER_COORD"]),
      sup: pick(headers,["SUPERINTENDÊNCIA","SUPERINTENDENCIA","SUPER","SUPERINT"]),
      coord: pick(headers,["COORDENAÇÃO","COORDENACAO","COORD","COORDENADORIA"]),
      setor: pick(headers,["SETOR","UNIDADE","LOTAÇÃO","LOTACAO","ÓRGÃO","ORGAO"]),
      ref: pick(headers,["REFERÊNCIA","REFERENCIA","MÊS","MES","COMPETÊNCIA","COMPETENCIA","DATA_REF"]),
      afast: pick(headers,["AFASTAMENTO","SITUAÇÃO","SITUACAO","STATUS","SITUAÇÃO FUNCIONAL","SITUACAO FUNCIONAL","ATIVO_AFASTADO"]),
      tipo: pick(headers,["TIPOCARGO","TIPO CARGO","TIPO DE CARGO","CLASSIFICAÇÃO CARGO","CLASSIFICACAO CARGO"]),
      tipoSetor: pick(headers,["TIPOSETOR","TIPO SETOR"]),
      cargo: pick(headers,["CARGO","CARGO_ATUAL"]),
      funcao: pick(headers,["FUNÇÃO","FUNCAO","FUNCAO_ATUAL"]),
      idade: pick(headers,["IDADE","IDADE_ATUAL","IDADE_SERVIDOR"]),
      dtAtualizacao: pick(headers,["DATA_ATUALIZACAO","DT_ATUALIZACAO","ATUALIZADO_EM","DATA BASE","DATA_BASE"])
    };

    if(!COL.dir){
      throw new Error("Coluna de DIRETORIA não localizada na base.");
    }

    populateFilters();
    render();

    if($("updated")){
      const dt =
        COL.dtAtualizacao ? val(ROWS[0],COL.dtAtualizacao) :
        new Date().toLocaleString("pt-BR");

      $("updated").textContent = "Atualizado em: " + dt;
    }

  }catch(err){
    console.error(err);

    showError(
      "Não foi possível carregar os dados. " +
      err.message +
      " | Confirme: Apps Script publicado como Web App, acesso 'Qualquer pessoa' e URL terminando em /exec."
    );

    if($("updated")){
      $("updated").textContent = "Atualizado em: erro no carregamento";
    }
  }
}

["fDir","fSupCoord","fSetor","fRef"].forEach(id => {
  document.addEventListener("change", e => {
    if(e.target && e.target.id === id){
      render();
    }
  });
});

document.addEventListener("DOMContentLoaded", loadData);
</script>
